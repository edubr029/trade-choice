modLoader="javafml"
loaderVersion="*"
license="MIT"

[[mods]]
modId="tradechoice"
version="${version}"
displayName="Trade Choice"
description="Mark wanted villager trades and get audio alerts when matching offers appear. Optional auto-search cycles villager trades until your wishlist items show up (requires Trade Cycling)."
authors="edubr029"
contact.homepage="https://modrinth.com/mod/trade-choice"
contact.sources="https://github.com/edubr029/trade-choice"

[[mixins]]
config = "tradechoice.client.mixins.json"

[[dependencies.tradechoice]]
    modId="neoforge"
    type="required"
    versionRange="[26.2.0.0-beta,)"
    ordering="NONE"
    side="BOTH"

[[dependencies.tradechoice]]
    modId="minecraft"
    type="required"
    versionRange="[26.2,26.3)"
    ordering="NONE"
    side="BOTH"

[[dependencies.tradechoice]]
    modId="trade_cycling"
    type="optional"
    versionRange="*"
    ordering="NONE"
    side="CLIENT"
